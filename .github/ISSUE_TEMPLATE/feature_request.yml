name: Feature request
description: Suggest a focused improvement for NetAdmin Toolbox.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What task or user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the smallest useful solution.
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Affected area
      placeholder: Network, DNS, Utilities, PWA, documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
