name: Bug report
description: Report a reproducible problem in NetAdmin Toolbox.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Please remove private data, credentials, and sensitive network information before submitting.
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: tool
    attributes:
      label: Affected tool or page
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
    validations:
      required: true
  - type: dropdown
    id: connectivity
    attributes:
      label: Connectivity mode
      options:
        - Online
        - Offline
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Redact secrets and private data.
