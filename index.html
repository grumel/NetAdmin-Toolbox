<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="description" content="A modern, installable workspace for network administration tools." />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <title>NetAdmin Toolbox</title>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" aria-label="Primary navigation">
        <a class="brand" href="#dashboard" aria-label="NetAdmin Toolbox dashboard">
          <img src="assets/icons/icon.svg" alt="" width="36" height="36" />
          <span>NetAdmin<span class="brand-muted"> Toolbox</span></span>
        </a>

        <nav class="navigation" id="primary-navigation">
          <!-- Navigation items are rendered by the application module. -->
        </nav>

        <div class="sidebar-footer">
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch color theme">
            <span aria-hidden="true">◐</span><span>Appearance</span>
          </button>
          <p class="connection-status" id="connection-status" role="status">Checking connection…</p>
        </div>
      </aside>

      <main class="main-content" id="app-content" tabindex="-1">
        <!-- Views are rendered by the application module. -->
      </main>
    </div>
    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
