<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'none'; object-src 'none'; form-action 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; media-src 'none'; frame-src 'none'" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="description" content="A modern, installable workspace for network administration tools." />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <title>NetAdmin Toolbox</title>
  </head>
  <body>
    <a class="skip-link" href="#app-content">Skip to main content</a>
    <div class="app-layout">
      <aside class="sidebar" aria-label="Primary navigation">
        <a class="brand" href="#/dashboard" aria-label="NetAdmin Toolbox dashboard">
          <img src="assets/icons/icon.svg" alt="" width="36" height="36" />
          <span>NetAdmin<span class="brand-muted"> Toolbox</span></span>
        </a>
        <nav class="navigation" id="primary-navigation" aria-label="Toolbox sections"></nav>
      </aside>

      <section class="workspace">
        <header class="app-header">
          <div><p class="eyebrow">Administration workspace</p><p class="project-title">NetAdmin Toolbox</p></div>
          <div class="header-actions">
            <p class="connection-status" id="connection-status" role="status">Checking connection…</p>
            <button class="theme-toggle" id="theme-toggle" type="button" aria-pressed="true">
              <span aria-hidden="true">◐</span><span id="theme-toggle-label">Use light mode</span>
            </button>
          </div>
        </header>
        <main class="main-content" id="app-content" tabindex="-1" aria-live="polite"></main>
      </section>
    </div>
    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
